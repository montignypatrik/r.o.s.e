version: '3.9'

services:
  # ============================================
  # R.O.S.E Core Application
  # ============================================
  rose:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rose-ai
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"      # Web Dashboard
      - "${OPENCLAW_PORT:-8080}:8080" # OpenClaw Gateway
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DATABASE_URL=postgresql://rose:${POSTGRES_PASSWORD:-rose123}@postgres:5432/rose
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=${SESSION_SECRET}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - rose-data:/app/data
      - rose-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rose-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # PostgreSQL Database (with pgvector)
  # ============================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rose-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=rose
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rose123}
      - POSTGRES_DB=rose
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - rose-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rose -d rose"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis (for caching & sessions)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: rose-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - rose-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Nginx Reverse Proxy (Optional - for HTTPS)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: rose-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/ssl:/etc/nginx/ssl:ro
    depends_on:
      - rose
    networks:
      - rose-network
    profiles:
      - production

# ============================================
# Volumes
# ============================================
volumes:
  rose-data:
    driver: local
  rose-logs:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  rose-network:
    driver: bridge
